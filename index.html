<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grote Wereldklok</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .main-clock {
            text-align: center;
            margin-bottom: 4rem;
        }

        /* De hoofklok is nu VEEL groter */
        #local-time {
            font-size: 10rem; /* Was 6rem */
            font-weight: 800;
            color: var(--accent-color);
            text-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
            margin: 10px 0;
            line-height: 1;
        }

        .date-display {
            font-size: 2.5rem; /* Grotere datum */
            opacity: 0.9;
            font-weight: 300;
        }

        .label {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .world-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        .city-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .city-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .city-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 15px;
            display: block;
            color: var(--accent-color);
        }

        .city-time {
            font-size: 2.5rem; /* Grotere stedenklokken */
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        /* Mobiele aanpassing voor als het scherm klein is */
        @media (max-width: 768px) {
            #local-time {
                font-size: 5rem;
            }
            .date-display {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="main-clock">
        <div class="date-display" id="date">Laden...</div>
        <h1 id="local-time">00:00:00</h1>
        <div class="label">Jouw Lokale Tijd</div>
    </div>

    <div class="world-grid" id="world-grid">
        </div>

    <script>
        const cities = [
            { name: 'New York', zone: 'America/New_York' },
            { name: 'Londen', zone: 'Europe/London' },
            { name: 'Tokio', zone: 'Asia/Tokyo' },
            { name: 'Dubai', zone: 'Asia/Dubai' }
        ];

        function updateClocks() {
            const now = new Date();

            // Update Hoofdklok
            const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('local-time').textContent = now.toLocaleTimeString('nl-NL', options);
            
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('nl-NL', dateOptions);

            // Update Wereldsteden
            const grid = document.getElementById('world-grid');
            grid.innerHTML = ''; 

            cities.forEach(city => {
                const cityTime = new Intl.DateTimeFormat('nl-NL', {
                    timeZone: city.zone,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                }).format(now);

                const card = document.createElement('div');
                card.className = 'city-card';
                card.innerHTML = `
                    <span class="city-name">${city.name}</span>
                    <span class="city-time">${cityTime}</span>
                `;
                grid.appendChild(card);
            });
        }

        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
</body>
</html>
