<!DOCTYPE html>
<html>
<head>
    <style>
        /* Force a black background and bright cyan text */
        html, body {
            background-color: #000000 !important;
            color: #00ffff !important;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }
        #clock {
            font-size: 15vw;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="clock">00:00:00</div>

    <script>
        function update() {
            const now = new Date();
            document.getElementById('clock').innerHTML = now.toLocaleTimeString();
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
